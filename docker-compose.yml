version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fetish-db
    environment:
      POSTGRES_DB: fetishapp
      POSTGRES_USER: fetishapp
      POSTGRES_PASSWORD: fetishapp_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fetishapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: fetish-server
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://fetishapp:fetishapp_dev_password@postgres:5432/fetishapp
      JWT_SECRET: dev_jwt_secret_change_in_production
      JWT_REFRESH_SECRET: dev_refresh_secret_change_in_production
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      CLIENT_URL: http://localhost:5173
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server/src:/app/src
    command: ["npm", "run", "dev"]

volumes:
  pgdata:
